<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS Place</title>
  <link rel="stylesheet" href="frontend/css/style.css" />
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

  <header id="cabecalho">OS Place — Assistência Técnica</header>

  <main id="conteudo-principal">

    <section id="secao-formulario">
      <h2>Nova Ordem de Serviço</h2>

      <div id="formulario-os">

        <div class="grupo-campo">
          <label for="campo-cliente">Cliente</label>
          <input type="text" id="campo-cliente" placeholder="Ex: João Silva" />
        </div>

        <div class="grupo-campo">
          <label for="campo-aparelho">Aparelho</label>
          <input type="text" id="campo-aparelho" placeholder="Ex: Samsung A54" />
        </div>

        <div class="grupo-campo">
          <label for="campo-problema">Problema</label>
          <input type="text" id="campo-problema" placeholder="Ex: Tela quebrada" />
        </div>

        <button id="botao-adicionar">Abrir OS</button>

      </div>

      <p id="mensagem-feedback"></p>
    </section>

    <section id="secao-lista">
      <div id="cabecalho-lista">
        <h2>Ordens de Serviço</h2>
        <span id="contador-ordens">0 abertas</span>
      </div>

      <div id="lista-ordens">
        <!-- cards inseridos via JS -->
      </div>
    </section>

    <section id="secao-grafico">
      <h2>Painel de Controle</h2>
      <div id="grafico-os"></div>
    </section>

  </main>

  <script src="frontend/js/script.js"></script>
  <script src="frontend/js/routes.js"></script>

</body>
</html>
